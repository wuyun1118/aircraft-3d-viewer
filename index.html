<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airbus A320 3D Viewer | 国航飞机维修系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            overflow: hidden;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        #info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 13px;
            z-index: 100;
            background: rgba(10, 20, 40, 0.9);
            padding: 20px;
            border: 1px solid #00d4ff;
            border-radius: 8px;
            min-width: 240px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        
        #info-panel h3 {
            margin-bottom: 12px;
            font-size: 14px;
            color: #00d4ff;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 8px;
            letter-spacing: 2px;
        }
        
        #info-panel .aircraft-no {
            font-size: 28px;
            color: #fff;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 3px;
        }
        
        #info-panel .model {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        #info-panel .meta-info {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            line-height: 1.8;
        }
        
        #info-panel .meta-info span {
            color: #fff;
        }
        
        #info-panel .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            margin-top: 10px;
            font-weight: bold;
        }
        
        #info-panel .status-badge.repair {
            background: rgba(255, 68, 68, 0.3);
            color: #ff6b6b;
            border: 1px solid #ff4444;
        }
        
        #info-panel .status-badge.complete {
            background: rgba(68, 255, 68, 0.3);
            color: #6bff6b;
            border: 1px solid #44ff44;
        }
        
        #parts-list {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 12px;
            z-index: 100;
            background: rgba(10, 20, 40, 0.9);
            padding: 20px;
            border: 1px solid #00d4ff;
            border-radius: 8px;
            max-height: 500px;
            overflow-y: auto;
            min-width: 220px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        
        #parts-list h4 {
            margin-bottom: 15px;
            font-size: 13px;
            color: #00d4ff;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .part-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .part-item:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
        }
        
        .part-item .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 12px;
            animation: pulse 1.5s infinite;
        }
        
        .part-item .dot.repair {
            background: #ff4444;
            box-shadow: 0 0 8px #ff4444;
        }
        
        .part-item .dot.complete {
            background: #44ff44;
            box-shadow: 0 0 8px #44ff44;
        }
        
        .part-item .name {
            color: #fff;
            flex: 1;
        }
        
        .part-item .status {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 3px;
        }
        
        .part-item .status.repair {
            background: rgba(255, 68, 68, 0.2);
            color: #ff6b6b;
        }
        
        .part-item .status.complete {
            background: rgba(68, 255, 68, 0.2);
            color: #6bff6b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        
        #detail-popup {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 25, 50, 0.95);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 25px;
            color: #fff;
            z-index: 200;
            display: none;
            min-width: 350px;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
        }
        
        #detail-popup.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        #detail-popup h4 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 10px;
        }
        
        #detail-popup .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #00d4ff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        
        #detail-popup .close-btn:hover {
            opacity: 1;
        }
        
        #detail-popup .popup-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        #detail-popup .popup-status.repair {
            background: rgba(255, 68, 68, 0.3);
            color: #ff6b6b;
        }
        
        #detail-popup .popup-status.complete {
            background: rgba(68, 255, 68, 0.3);
            color: #6bff6b;
        }
        
        #detail-popup .detail-content {
            font-size: 13px;
            line-height: 1.8;
            color: rgba(255,255,255,0.9);
        }
        
        #controls-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            z-index: 100;
            text-align: right;
            line-height: 1.6;
        }
        
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            font-size: 16px;
            z-index: 300;
            text-align: center;
        }
        
        #loading::after {
            content: '';
            display: block;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 2px solid #00d4ff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #error-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 16px;
            z-index: 300;
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #ff4444;
        }
        
        #version-tag {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 212, 255, 0.6);
            font-size: 12px;
            z-index: 100;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="version-tag">AIRBUS A320 3D MODEL v2.2 (SIMPLIFIED)</div>
    <div id="info-panel">
        <h3>◆ AIRCRAFT INFORMATION</h3>
        <div class="aircraft-no" id="aircraft-no">B-4680</div>
        <div class="model" id="aircraft-model">Airbus A320-200</div>
        <div class="meta-info">
            MSN: <span id="msn">4521</span><br>
            ENGINE: <span id="engine">CFM56-5B4/3</span><br>
            IN DATE: <span id="in-date">2025年04月06日</span><br>
            OUT DATE: <span id="out-date">2025年04月20日</span>
        </div>
        <div class="status-badge repair" id="status-badge">维修中</div>
    </div>
    <div id="parts-list">
        <h4>◆ MAINTENANCE CHECKLIST</h4>
        <div id="parts-container"></div>
    </div>
    <div id="detail-popup">
        <button class="close-btn" onclick="closePopup()">×</button>
        <h4 id="popup-title">部件名称</h4>
        <div class="popup-status repair" id="popup-status">维修中</div>
        <div class="detail-content" id="popup-content"></div>
    </div>
    <div id="controls-hint">
        🖱️ 左键拖拽旋转<br>
        🖱️ 滚轮缩放<br>
        👆 点击标记查看详情
    </div>
    <div id="loading">Loading Airbus A320 3D Model...</div>
    <div id="error-msg"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // 飞机数据
        const urlParams = new URLSearchParams(window.location.search);
        const aircraftData = {
            no: urlParams.get('no') || 'B-4680',
            model: urlParams.get('model') || 'Airbus A320-200',
            msn: urlParams.get('msn') || '4521',
            engine: urlParams.get('engine') || 'CFM56-5B4/3',
            inDate: urlParams.get('inDate') || '',
            outDate: urlParams.get('outDate') || '',
            parts: [
                { name: '驾驶舱', status: 'complete', detail: '航电系统全面检查完成。PFD/ND显示器测试正常，FMC软件已更新至最新版本，自动驾驶系统通过功能测试。' },
                { name: '左发动机', status: 'repair', detail: 'CFM56-5B发动机高压涡轮叶片更换。发现第3级涡轮叶片有轻微裂纹，已更换新件。预计剩余工期：5天。' },
                { name: '右发动机', status: 'repair', detail: '发动机常规C检进行中。已完成风扇叶片检查、燃烧室目视检查。正在进行核心机孔探检查。预计剩余工期：7天。' },
                { name: '左机翼', status: 'repair', detail: '机翼前缘缝翼滑轨更换。发现滑轨轴承磨损超标，已更换新件。正在进行缝翼收放测试。预计剩余工期：3天。' },
                { name: '右机翼', status: 'complete', detail: '机翼结构检查已完成。襟翼、副翼、扰流板作动筒功能正常，燃油系统无渗漏，翼肋无腐蚀。' },
                { name: '水平尾翼', status: 'complete', detail: '升降舵和水平安定面检查完成。THS作动筒功能测试正常，配平系统校准完成。' },
                { name: '垂直尾翼', status: 'complete', detail: '方向舵和垂直安定面检查完成。方向舵作动筒功能测试正常，结构无损伤。' },
                { name: '前起落架', status: 'repair', detail: '前起落架减震支柱封圈更换。发现支柱漏油，已更换O型封圈并充氮气。正在进行起落架收放测试。预计剩余工期：2天。' },
                { name: '主起落架', status: 'repair', detail: '主起落架刹车组件和轮胎更换。刹车磨损指示器已接近极限，已更换碳刹车组件。同时更换了4个主轮轮胎。预计剩余工期：4天。' },
                { name: 'APU', status: 'complete', detail: 'APU APS3200例行检查完成。启动系统、发电系统、引气系统功能正常，滑油系统无渗漏。' }
            ]
        };

        // 更新信息面板
        document.getElementById('aircraft-no').textContent = aircraftData.no;
        document.getElementById('aircraft-model').textContent = aircraftData.model;
        document.getElementById('msn').textContent = aircraftData.msn;
        document.getElementById('engine').textContent = aircraftData.engine;
        document.getElementById('in-date').textContent = formatDate(aircraftData.inDate);
        document.getElementById('out-date').textContent = formatDate(aircraftData.outDate);

        const repairCount = aircraftData.parts.filter(p => p.status === 'repair').length;
        const statusBadge = document.getElementById('status-badge');
        if (repairCount === 0) {
            statusBadge.textContent = '已完成';
            statusBadge.className = 'status-badge complete';
        } else {
            statusBadge.textContent = `维修中 (${repairCount}/10)`;
        }

        // 渲染维修部位列表
        const partsContainer = document.getElementById('parts-container');
        aircraftData.parts.forEach((part) => {
            const div = document.createElement('div');
            div.className = 'part-item';
            div.innerHTML = `
                <div class="dot ${part.status}"></div>
                <span class="name">${part.name}</span>
                <span class="status ${part.status}">${part.status === 'repair' ? '维修中' : '已完成'}</span>
            `;
            div.onclick = () => showPartDetail(part);
            partsContainer.appendChild(div);
        });

        // Three.js 场景
        let scene, camera, renderer, controls;
        let aircraft, markers = [];

        function init() {
            try {
                console.log('Initializing Three.js...');
                if (typeof THREE === 'undefined') {
                    throw new Error('Three.js库加载失败，请检查网络连接');
                }
                console.log('THREE loaded:', THREE.REVISION);

                // 场景
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0a0a1a);
                scene.fog = new THREE.Fog(0x0a0a1a, 20, 60);

                // 相机
                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(12, 8, 12);

                // 渲染器
                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                document.getElementById('canvas-container').appendChild(renderer.domElement);

                // 控制器
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.minDistance = 8;
                controls.maxDistance = 40;
                controls.maxPolarAngle = Math.PI / 2 - 0.1;

                // 环境光
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
                scene.add(ambientLight);

                // 主光源
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 20, 10);
                directionalLight.castShadow = true;
                directionalLight.shadow.mapSize.width = 2048;
                directionalLight.shadow.mapSize.height = 2048;
                scene.add(directionalLight);

                // 补光
                const fillLight = new THREE.DirectionalLight(0x00d4ff, 0.3);
                fillLight.position.set(-10, 10, -10);
                scene.add(fillLight);

                // 创建A320飞机模型
                createA320();

                // 创建地面
                createGround();

                // 隐藏加载提示
                document.getElementById('loading').style.display = 'none';
                console.log('Initialization complete!');

                // 事件监听
                window.addEventListener('resize', onWindowResize);
                renderer.domElement.addEventListener('click', onMouseClick);

                animate();
            } catch (error) {
                console.error('Initialization failed:', error);
                document.getElementById('loading').style.display = 'none';
                const errorDiv = document.getElementById('error-msg');
                errorDiv.innerHTML = '3D模型加载失败<br><small>' + error.message + '</small><br><small>请检查控制台获取详细信息</small>';
                errorDiv.style.display = 'block';
            }
        }

        // 创建A320专业模型 - 使用简单几何体
        function createA320() {
            console.log('Creating A320 model...');
            aircraft = new THREE.Group();

            // 材质定义
            const fuselageMaterial = new THREE.MeshPhongMaterial({
                color: 0xe8e8e8, shininess: 30, specular: 0x111111
            });
            const wingMaterial = new THREE.MeshPhongMaterial({
                color: 0xd0d0d0, shininess: 40, specular: 0x222222
            });
            const engineMaterial = new THREE.MeshPhongMaterial({
                color: 0x888888, shininess: 60
            });
            const cockpitMaterial = new THREE.MeshPhongMaterial({
                color: 0x1a1a2e, shininess: 80, transparent: true, opacity: 0.9
            });
            const gearMaterial = new THREE.MeshPhongMaterial({
                color: 0x333333, shininess: 20
            });
            const wireframeMaterial = new THREE.MeshBasicMaterial({
                color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.15
            });

            // 1. 机身主体
            const fuselageLength = 7.5;
            const fuselageRadius = 0.4;

            const fuselageGeo = new THREE.CylinderGeometry(fuselageRadius, fuselageRadius, fuselageLength, 32);
            const fuselage = new THREE.Mesh(fuselageGeo, fuselageMaterial);
            fuselage.rotation.x = Math.PI / 2;
            fuselage.castShadow = true;
            fuselage.receiveShadow = true;
            aircraft.add(fuselage);

            // 机身线框
            const fuselageWire = new THREE.Mesh(fuselageGeo, wireframeMaterial);
            fuselageWire.rotation.x = Math.PI / 2;
            aircraft.add(fuselageWire);

            // 2. 机头
            const noseGeo = new THREE.SphereGeometry(fuselageRadius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
            const nose = new THREE.Mesh(noseGeo, fuselageMaterial);
            nose.scale.set(1, 1, 2.5);
            nose.position.z = fuselageLength / 2 + 0.4;
            nose.castShadow = true;
            aircraft.add(nose);

            // 驾驶舱窗户
            const cockpitGeo = new THREE.SphereGeometry(fuselageRadius * 0.98, 32, 16, 0, Math.PI * 2, 0, Math.PI / 3);
            const cockpit = new THREE.Mesh(cockpitGeo, cockpitMaterial);
            cockpit.scale.set(1, 0.8, 2);
            cockpit.position.z = fuselageLength / 2 + 0.35;
            cockpit.position.y = fuselageRadius * 0.3;
            aircraft.add(cockpit);

            // 3. 机尾锥形
            const tailConeGeo = new THREE.CylinderGeometry(fuselageRadius * 0.9, fuselageRadius, 1.2, 32);
            const tailCone = new THREE.Mesh(tailConeGeo, fuselageMaterial);
            tailCone.rotation.x = Math.PI / 2;
            tailCone.position.z = -fuselageLength / 2 - 0.6;
            tailCone.castShadow = true;
            aircraft.add(tailCone);

            // 4. 机翼 - 使用BoxGeometry
            const wingSpan = 7.2;
            const wingChord = 1.2;
            const wingThickness = 0.08;
            
            // 左翼
            const leftWingGeo = new THREE.BoxGeometry(wingChord, wingThickness, wingSpan / 2);
            const leftWing = new THREE.Mesh(leftWingGeo, wingMaterial);
            leftWing.position.set(-wingChord / 2 - 0.3, 0, wingSpan / 4 + 0.3);
            leftWing.rotation.z = -0.05;
            leftWing.castShadow = true;
            leftWing.receiveShadow = true;
            aircraft.add(leftWing);
            
            // 左翼后掠效果
            const leftWingTipGeo = new THREE.BoxGeometry(wingChord * 0.3, wingThickness, wingSpan / 4);
            const leftWingTip = new THREE.Mesh(leftWingTipGeo, wingMaterial);
            leftWingTip.position.set(-wingChord * 0.3 - 0.5, 0, wingSpan / 2 + 0.5);
            leftWingTip.rotation.z = -0.1;
            leftWingTip.castShadow = true;
            aircraft.add(leftWingTip);

            // 右翼
            const rightWing = leftWing.clone();
            rightWing.position.set(wingChord / 2 + 0.3, 0, wingSpan / 4 + 0.3);
            rightWing.rotation.z = 0.05;
            aircraft.add(rightWing);
            
            const rightWingTip = leftWingTip.clone();
            rightWingTip.position.set(wingChord * 0.3 + 0.5, 0, wingSpan / 2 + 0.5);
            rightWingTip.rotation.z = 0.1;
            aircraft.add(rightWingTip);

            // 5. 垂直尾翼
            const vStabHeight = 1.6;
            const vStabWidth = 0.8;
            const vStabThickness = 0.12;
            
            const vStabGeo = new THREE.BoxGeometry(vStabThickness, vStabHeight, vStabWidth);
            const vStab = new THREE.Mesh(vStabGeo, wingMaterial);
            vStab.position.set(0, vStabHeight / 2 + 0.3, -3);
            vStab.rotation.y = -0.2;
            vStab.castShadow = true;
            aircraft.add(vStab);
            
            // 垂直尾翼后掠效果
            const vStabTipGeo = new THREE.BoxGeometry(vStabThickness, vStabHeight * 0.4, vStabWidth * 0.4);
            const vStabTip = new THREE.Mesh(vStabTipGeo, wingMaterial);
            vStabTip.position.set(-0.15, vStabHeight + 0.1, -3.3);
            vStabTip.rotation.y = -0.3;
            aircraft.add(vStabTip);

            // 6. 水平尾翼
            const hStabSpan = 2.4;
            const hStabChord = 0.7;
            const hStabThickness = 0.06;
            
            // 左水平尾翼
            const leftHStabGeo = new THREE.BoxGeometry(hStabChord, hStabThickness, hStabSpan / 2);
            const leftHStab = new THREE.Mesh(leftHStabGeo, wingMaterial);
            leftHStab.position.set(-hStabChord / 2 - 0.1, 0.15, -3.2 + hStabSpan / 4);
            leftHStab.castShadow = true;
            aircraft.add(leftHStab);
            
            // 左水平尾翼后掠
            const leftHStabTipGeo = new THREE.BoxGeometry(hStabChord * 0.4, hStabThickness, hStabSpan / 4);
            const leftHStabTip = new THREE.Mesh(leftHStabTipGeo, wingMaterial);
            leftHStabTip.position.set(-hStabChord * 0.4 - 0.3, 0.15, -3.2 + hStabSpan / 2 + 0.1);
            leftHStabTip.rotation.z = -0.1;
            aircraft.add(leftHStabTip);

            // 右水平尾翼
            const rightHStab = leftHStab.clone();
            rightHStab.position.set(hStabChord / 2 + 0.1, 0.15, -3.2 + hStabSpan / 4);
            aircraft.add(rightHStab);
            
            const rightHStabTip = leftHStabTip.clone();
            rightHStabTip.position.set(hStabChord * 0.4 + 0.3, 0.15, -3.2 + hStabSpan / 2 + 0.1);
            rightHStabTip.rotation.z = 0.1;
            aircraft.add(rightHStabTip);

            // 7. 发动机
            const engineLength = 1.4;
            const engineRadius = 0.28;

            function createEngine(x, y, z) {
                const engineGroup = new THREE.Group();

                // 发动机外壳
                const casingGeo = new THREE.CylinderGeometry(engineRadius, engineRadius * 0.85, engineLength, 24);
                const casing = new THREE.Mesh(casingGeo, engineMaterial);
                casing.rotation.x = Math.PI / 2;
                casing.castShadow = true;
                engineGroup.add(casing);

                // 进气口
                const intakeGeo = new THREE.TorusGeometry(engineRadius * 0.95, 0.03, 8, 24);
                const intake = new THREE.Mesh(intakeGeo, new THREE.MeshPhongMaterial({ color: 0x333333 }));
                intake.position.z = engineLength / 2;
                engineGroup.add(intake);

                // 尾喷口
                const nozzleGeo = new THREE.CylinderGeometry(engineRadius * 0.85, engineRadius * 0.6, 0.3, 24);
                const nozzle = new THREE.Mesh(nozzleGeo, new THREE.MeshPhongMaterial({ color: 0x555555 }));
                nozzle.rotation.x = Math.PI / 2;
                nozzle.position.z = -engineLength / 2 - 0.15;
                engineGroup.add(nozzle);

                // 挂架
                const pylonGeo = new THREE.BoxGeometry(0.08, 0.4, 0.3);
                const pylon = new THREE.Mesh(pylonGeo, wingMaterial);
                pylon.position.y = engineRadius + 0.2;
                pylon.position.z = 0.2;
                engineGroup.add(pylon);

                engineGroup.position.set(x, y, z);
                return engineGroup;
            }

            // 左发动机
            const leftEngine = createEngine(-1.8, -0.5, 0.2);
            aircraft.add(leftEngine);

            // 右发动机
            const rightEngine = createEngine(1.8, -0.5, 0.2);
            aircraft.add(rightEngine);

            // 8. 起落架
            function createLandingGear() {
                const gearGroup = new THREE.Group();

                // 前起落架
                const noseGearStrut = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.04, 0.8, 8),
                    gearMaterial
                );                noseGearStrut.position.set(0, -0.8, 2.2);
                gearGroup.add(noseGearStrut);

                const noseWheel = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.15, 0.15, 0.1, 16),
                    new THREE.MeshPhongMaterial({ color: 0x222222 })
                );
                noseWheel.rotation.z = Math.PI / 2;
                noseWheel.position.set(0, -1.2, 2.2);
                gearGroup.add(noseWheel);

                // 主起落架 - 左侧
                const mainGearStrutL = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.06, 0.06, 1, 8),
                    gearMaterial
                );
                mainGearStrutL.position.set(-0.6, -0.9, -0.3);
                gearGroup.add(mainGearStrutL);

                const mainWheelL1 = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.22, 0.22, 0.15, 16),
                    new THREE.MeshPhongMaterial({ color: 0x222222 })
                );
                mainWheelL1.rotation.z = Math.PI / 2;
                mainWheelL1.position.set(-0.6, -1.4, -0.1);
                gearGroup.add(mainWheelL1);

                const mainWheelL2 = mainWheelL1.clone();
                mainWheelL2.position.set(-0.6, -1.4, -0.5);
                gearGroup.add(mainWheelL2);

                // 主起落架 - 右侧
                const mainGearStrutR = mainGearStrutL.clone();
                mainGearStrutR.position.set(0.6, -0.9, -0.3);
                gearGroup.add(mainGearStrutR);

                const mainWheelR1 = mainWheelL1.clone();
                mainWheelR1.position.set(0.6, -1.4, -0.1);
                gearGroup.add(mainWheelR1);

                const mainWheelR2 = mainWheelL2.clone();
                mainWheelR2.position.set(0.6, -1.4, -0.5);
                gearGroup.add(mainWheelR2);

                return gearGroup;
            }

            const landingGear = createLandingGear();
            aircraft.add(landingGear);

            // 添加维修标记点
            createMarkers();

            scene.add(aircraft);
            console.log('A320 model created successfully!');
        }

        function createMarkers() {
            const markerPositions = [
                { name: '驾驶舱', pos: [0, 0.6, 3.2], status: 'complete' },
                { name: '左发动机', pos: [-1.8, -0.5, 0.2], status: 'repair' },
                { name: '右发动机', pos: [1.8, -0.5, 0.2], status: 'repair' },
                { name: '左机翼', pos: [-3.5, 0.1, 0.5], status: 'repair' },
                { name: '右机翼', pos: [3.5, 0.1, 0.5], status: 'complete' },
                { name: '水平尾翼', pos: [0, 0.2, -3.2], status: 'complete' },
                { name: '垂直尾翼', pos: [0, 1.5, -2.8], status: 'complete' },
                { name: '前起落架', pos: [0, -1.2, 2.2], status: 'repair' },
                { name: '主起落架', pos: [0, -1.4, -0.3], status: 'repair' }
            ];

            markerPositions.forEach(m => {
                const part = aircraftData.parts.find(p => p.name === m.name);
                if (part) {
                    const marker = createMarker(m.pos, part.status, m.name);
                    markers.push(marker);
                    aircraft.add(marker);
                }
            });
        }

        function createMarker(position, status, name) {
            const group = new THREE.Group();

            const geometry = new THREE.SphereGeometry(0.12, 16, 16);
            const color = status === 'repair' ? 0xff4444 : 0x44ff44;
            const material = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.9
            });
            const sphere = new THREE.Mesh(geometry, material);
            group.add(sphere);

            const glowGeometry = new THREE.SphereGeometry(0.22, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            group.add(glow);

            // 脉冲环
            const ringGeometry = new THREE.RingGeometry(0.25, 0.3, 32);
            const ringMaterial = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.lookAt(camera.position);
            group.add(ring);

            group.position.set(...position);
            group.userData = { name: name, status: status, ring: ring };

            if (status === 'repair') {
                group.userData.animate = true;
            }

            return group;
        }

        function createGround() {
            const gridHelper = new THREE.GridHelper(40, 40, 0x00d4ff, 0x003366);
            gridHelper.position.y = -2;
            gridHelper.material.opacity = 0.3;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            const planeGeometry = new THREE.PlaneGeometry(100, 100);
            const planeMaterial = new THREE.MeshPhongMaterial({
                color: 0x0a0a1a,
                transparent: true,
                opacity: 0.8
            });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -2.01;
            plane.receiveShadow = true;
            scene.add(plane);
        }

        function onMouseClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((event.clientX - rect.left) / rect.width) * 2 - 1,
                -((event.clientY - rect.top) / rect.height) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(markers, true);

            if (intersects.length > 0) {
                let marker = intersects[0].object;
                while (marker.parent && !marker.userData.name) {
                    marker = marker.parent;
                }
                if (marker.userData.name) {
                    const part = aircraftData.parts.find(p => p.name === marker.userData.name);
                    if (part) {
                        showPartDetail(part);
                    }
                }
            }
        }

        function showPartDetail(part) {
            document.getElementById('popup-title').textContent = part.name;
            const statusEl = document.getElementById('popup-status');
            statusEl.textContent = part.status === 'repair' ? '维修中' : '已完成';
            statusEl.className = 'popup-status ' + part.status;
            document.getElementById('popup-content').innerHTML = part.detail;
            document.getElementById('detail-popup').classList.add('show');
        }

        function closePopup() {
            document.getElementById('detail-popup').classList.remove('show');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '待定';
            let date;
            if (/^\d+$/.test(dateStr)) {
                date = new Date(parseInt(dateStr));
            } else {
                date = new Date(dateStr);
            }
            if (isNaN(date.getTime())) return '待定';
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;

            markers.forEach(marker => {
                if (marker.userData.animate) {
                    marker.scale.setScalar(1 + Math.sin(time * 3) * 0.15);
                    if (marker.userData.ring) {
                        marker.userData.ring.scale.setScalar(1 + Math.sin(time * 4) * 0.3);
                        marker.userData.ring.material.opacity = 0.3 + Math.sin(time * 4) * 0.2;
                        marker.userData.ring.lookAt(camera.position);
                    }
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        function waitForThreeJS() {
            if (typeof THREE !== 'undefined') {
                init();
            } else {
                setTimeout(waitForThreeJS, 100);
            }
        }

        waitForThreeJS();

        window.setAircraftData = function(data) {
            if (data.no) document.getElementById('aircraft-no').textContent = data.no;
            if (data.model) document.getElementById('aircraft-model').textContent = data.model;
            if (data.msn) document.getElementById('msn').textContent = data.msn;
            if (data.engine) document.getElementById('engine').textContent = data.engine;
            if (data.inDate) document.getElementById('in-date').textContent = formatDate(data.inDate);
            if (data.outDate) document.getElementById('out-date').textContent = formatDate(data.outDate);
        };
    </script>
</body>
</html>
