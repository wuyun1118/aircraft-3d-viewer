<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Aircraft CAD Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        
        /* 信息面板 */
        #info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00d4ff;
            font-size: 14px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #00d4ff;
            border-radius: 4px;
            min-width: 200px;
        }
        
        #info-panel h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #fff;
            border-bottom: 1px solid #00d4ff;
            padding-bottom: 5px;
        }
        
        #info-panel .aircraft-no {
            font-size: 20px;
            color: #fff;
            margin-bottom: 5px;
        }
        
        #info-panel .model {
            color: #00d4ff;
            margin-bottom: 10px;
        }
        
        /* 维修部位列表 */
        #parts-list {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #00d4ff;
            font-size: 12px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 1px solid #00d4ff;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        #parts-list h4 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #fff;
            border-bottom: 1px solid #00d4ff;
            padding-bottom: 5px;
        }
        
        .part-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 5px;
            border-radius: 3px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .part-item:hover {
            background: rgba(0, 212, 255, 0.2);
        }
        
        .part-item .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 1.5s infinite;
        }
        
        .part-item .dot.repair {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }
        
        .part-item .dot.complete {
            background: #44ff44;
            box-shadow: 0 0 10px #44ff44;
        }
        
        .part-item .name {
            color: #fff;
            margin-right: 10px;
        }
        
        .part-item .status {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
        }
        
        .part-item .status.repair {
            background: rgba(255, 68, 68, 0.3);
            color: #ff6b6b;
        }
        
        .part-item .status.complete {
            background: rgba(68, 255, 68, 0.3);
            color: #6bff6b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }
        
        /* 详情弹窗 */
        #detail-popup {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 20, 40, 0.95);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 20px;
            color: #fff;
            z-index: 200;
            display: none;
            min-width: 300px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }
        
        #detail-popup.show {
            display: block;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        #detail-popup h4 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        #detail-popup .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #00d4ff;
            font-size: 20px;
            cursor: pointer;
        }
        
        /* 控制提示 */
        #controls-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            z-index: 100;
        }
        
        /* 加载动画 */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00d4ff;
            font-size: 18px;
            z-index: 300;
        }
        
        /* 错误提示 */
        #error-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 16px;
            z-index: 300;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="info-panel">
        <h3>◆ AIRCRAFT INFO</h3>
        <div class="aircraft-no" id="aircraft-no">B-4680</div>
        <div class="model" id="aircraft-model">Airbus A320neo</div>
        <div style="font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 10px;">
            IN: <span id="in-date">2025年04月06日</span><br>
            STATUS: <span style="color: #ff6b6b;">维修中</span>
        </div>
    </div>
    
    <div id="parts-list">
        <h4>◆ MAINTENANCE PARTS</h4>
        <div id="parts-container"></div>
    </div>
    
    <div id="detail-popup">
        <button class="close-btn" onclick="closePopup()">×</button>
        <h4 id="popup-title">发动机-左</h4>
        <div id="popup-content"></div>
    </div>
    
    <div id="controls-hint">
        🖱️ 拖拽旋转 | 滚轮缩放 | 点击标记查看详情
    </div>
    
    <div id="loading">Loading 3D Model...</div>
    <div id="error-msg"></div>

    <!-- Three.js 核心库 (使用稳定版本 0.137.0) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/build/three.min.js"></script>
    <!-- OrbitControls 控制器 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.137.0/examples/js/controls/OrbitControls.js"></script>
    
    <script>
        // 飞机数据（从URL参数获取或使用默认值）
        const urlParams = new URLSearchParams(window.location.search);
        const aircraftData = {
            no: urlParams.get('no') || 'B-4680',
            model: urlParams.get('model') || 'Airbus A320neo',
            inDate: urlParams.get('inDate') || '',
            parts: [
                { name: '驾驶舱', status: 'complete', detail: '航电系统检查已完成，仪表显示正常' },
                { name: '发动机-左', status: 'repair', detail: 'CFM LEAP-1A发动机叶片损伤修复，预计工期15天' },
                { name: '发动机-右', status: 'repair', detail: '发动机常规检修中，更换高压涡轮叶片' },
                { name: '左机翼', status: 'repair', detail: '机翼前缘蒙皮更换，预计工期7天' },
                { name: '右机翼', status: 'complete', detail: '机翼结构检查已完成，无异常' },
                { name: '水平尾翼', status: 'complete', detail: '水平尾翼配平检查完成' },
                { name: '垂直尾翼', status: 'complete', detail: '垂直尾翼方向舵检查完成' },
                { name: '前起落架', status: 'repair', detail: '前起落架缓冲器更换，预计工期5天' },
                { name: '主起落架', status: 'repair', detail: '主起落架刹车组件更换，预计工期8天' },
                { name: 'APU', status: 'complete', detail: '辅助动力装置检查完成' }
            ]
        };
        
        // 更新信息面板
        document.getElementById('aircraft-no').textContent = aircraftData.no;
        document.getElementById('aircraft-model').textContent = aircraftData.model;
        document.getElementById('in-date').textContent = formatDate(aircraftData.inDate);
        
        // 渲染维修部位列表
        const partsContainer = document.getElementById('parts-container');
        aircraftData.parts.forEach((part, index) => {
            const div = document.createElement('div');
            div.className = 'part-item';
            div.innerHTML = `
                <div class="dot ${part.status}"></div>
                <span class="name">${part.name}</span>
                <span class="status ${part.status}">${part.status === 'repair' ? '维修中' : '已完成'}</span>
            `;
            div.onclick = () => showPartDetail(part);
            partsContainer.appendChild(div);
        });
        
        // Three.js 场景
        let scene, camera, renderer, controls;
        let aircraft, markers = [];
        
        function init() {
            try {
                // 检查Three.js是否加载
                if (typeof THREE === 'undefined') {
                    throw new Error('Three.js库加载失败，请检查网络连接');
                }
                
                // 场景
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x000510);
                
                // 相机
                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(8, 5, 10);
                
                // 渲染器
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.getElementById('canvas-container').appendChild(renderer.domElement);
                
                // 控制器
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.minDistance = 5;
                controls.maxDistance = 30;
                
                // 灯光
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.7);
                directionalLight.position.set(10, 10, 10);
                scene.add(directionalLight);
                
                // 创建飞机模型
                createAircraft();
                
                // 创建网格地面
                createGrid();
                
                // 隐藏加载提示
                document.getElementById('loading').style.display = 'none';
                
                // 窗口大小调整
                window.addEventListener('resize', onWindowResize);
                
                // 鼠标点击检测
                renderer.domElement.addEventListener('click', onMouseClick);
                
                animate();
            } catch (error) {
                console.error('初始化失败:', error);
                document.getElementById('loading').style.display = 'none';
                const errorDiv = document.getElementById('error-msg');
                errorDiv.innerHTML = '3D模型加载失败<br><small>' + error.message + '</small>';
                errorDiv.style.display = 'block';
            }
        }
        
        function createAircraft() {
            aircraft = new THREE.Group();
            
            // CAD线框材质
            const wireframeMaterial = new THREE.MeshBasicMaterial({
                color: 0x00d4ff,
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            
            const solidMaterial = new THREE.MeshPhongMaterial({
                color: 0x1a1a2e,
                emissive: 0x0a0a15,
                transparent: true,
                opacity: 0.6,
                side: THREE.DoubleSide
            });
            
            // 机身 - 圆柱体
            const fuselageGeometry = new THREE.CylinderGeometry(0.5, 0.5, 6, 16);
            const fuselage = new THREE.Mesh(fuselageGeometry, solidMaterial);
            fuselage.rotation.x = Math.PI / 2;
            fuselage.position.z = 0;
            aircraft.add(fuselage);
            
            const fuselageWire = new THREE.Mesh(fuselageGeometry, wireframeMaterial);
            fuselageWire.rotation.x = Math.PI / 2;
            fuselageWire.position.z = 0;
            aircraft.add(fuselageWire);
            
            // 驾驶舱 - 锥形
            const noseGeometry = new THREE.ConeGeometry(0.5, 1.5, 16);
            const nose = new THREE.Mesh(noseGeometry, solidMaterial);
            nose.rotation.x = -Math.PI / 2;
            nose.position.z = 3.5;
            aircraft.add(nose);
            
            const noseWire = new THREE.Mesh(noseGeometry, wireframeMaterial);
            noseWire.rotation.x = -Math.PI / 2;
            noseWire.position.z = 3.5;
            aircraft.add(noseWire);
            
            // 尾部锥形
            const tailGeometry = new THREE.ConeGeometry(0.5, 1, 16);
            const tail = new THREE.Mesh(tailGeometry, solidMaterial);
            tail.rotation.x = Math.PI / 2;
            tail.position.z = -3.5;
            aircraft.add(tail);
            
            const tailWire = new THREE.Mesh(tailGeometry, wireframeMaterial);
            tailWire.rotation.x = Math.PI / 2;
            tailWire.position.z = -3.5;
            aircraft.add(tailWire);
            
            // 主机翼 - 扁平盒子
            const wingGeometry = new THREE.BoxGeometry(8, 0.1, 1.5);
            const wing = new THREE.Mesh(wingGeometry, solidMaterial);
            wing.position.y = 0.1;
            aircraft.add(wing);
            
            const wingWire = new THREE.Mesh(wingGeometry, wireframeMaterial);
            wingWire.position.y = 0.1;
            aircraft.add(wingWire);
            
            // 垂直尾翼
            const vTailGeometry = new THREE.BoxGeometry(0.1, 1.5, 1);
            const vTail = new THREE.Mesh(vTailGeometry, solidMaterial);
            vTail.position.set(0, 0.75, -3);
            aircraft.add(vTail);
            
            const vTailWire = new THREE.Mesh(vTailGeometry, wireframeMaterial);
            vTailWire.position.set(0, 0.75, -3);
            aircraft.add(vTailWire);
            
            // 水平尾翼
            const hTailGeometry = new THREE.BoxGeometry(2.5, 0.08, 0.8);
            const hTail = new THREE.Mesh(hTailGeometry, solidMaterial);
            hTail.position.set(0, 0, -3);
            aircraft.add(hTail);
            
            const hTailWire = new THREE.Mesh(hTailGeometry, wireframeMaterial);
            hTailWire.position.set(0, 0, -3);
            aircraft.add(hTailWire);
            
            // 发动机 - 左
            const engineGeometry = new THREE.CylinderGeometry(0.25, 0.3, 1.2, 12);
            const engineL = new THREE.Mesh(engineGeometry, solidMaterial);
            engineL.rotation.x = Math.PI / 2;
            engineL.position.set(-2, -0.3, 0.5);
            aircraft.add(engineL);
            
            const engineLWire = new THREE.Mesh(engineGeometry, wireframeMaterial);
            engineLWire.rotation.x = Math.PI / 2;
            engineLWire.position.set(-2, -0.3, 0.5);
            aircraft.add(engineLWire);
            
            // 发动机 - 右
            const engineR = new THREE.Mesh(engineGeometry, solidMaterial);
            engineR.rotation.x = Math.PI / 2;
            engineR.position.set(2, -0.3, 0.5);
            aircraft.add(engineR);
            
            const engineRWire = new THREE.Mesh(engineGeometry, wireframeMaterial);
            engineRWire.rotation.x = Math.PI / 2;
            engineRWire.position.set(2, -0.3, 0.5);
            aircraft.add(engineRWire);
            
            // 添加维修部位标记点
            createMarkers();
            
            scene.add(aircraft);
        }
        
        function createMarkers() {
            const markerPositions = [
                { name: '驾驶舱', pos: [0, 0.5, 3], status: 'complete' },
                { name: '发动机-左', pos: [-2, -0.3, 0.5], status: 'repair' },
                { name: '发动机-右', pos: [2, -0.3, 0.5], status: 'repair' },
                { name: '左机翼', pos: [-3, 0.1, 0], status: 'repair' },
                { name: '右机翼', pos: [3, 0.1, 0], status: 'complete' },
                { name: '水平尾翼', pos: [0, 0, -3], status: 'complete' },
                { name: '垂直尾翼', pos: [0, 1, -3], status: 'complete' },
                { name: '前起落架', pos: [0, -0.5, 2.5], status: 'repair' },
                { name: '主起落架', pos: [0, -0.5, -0.5], status: 'repair' }
            ];
            
            markerPositions.forEach(m => {
                const part = aircraftData.parts.find(p => p.name === m.name);
                if (part) {
                    const marker = createMarker(m.pos, part.status, m.name);
                    markers.push(marker);
                    aircraft.add(marker);
                }
            });
        }
        
        function createMarker(position, status, name) {
            const group = new THREE.Group();
            
            // 球体标记
            const geometry = new THREE.SphereGeometry(0.15, 16, 16);
            const color = status === 'repair' ? 0xff4444 : 0x44ff44;
            const material = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.9
            });
            const sphere = new THREE.Mesh(geometry, material);
            group.add(sphere);
            
            // 发光效果
            const glowGeometry = new THREE.SphereGeometry(0.25, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.3
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            group.add(glow);
            
            group.position.set(...position);
            group.userData = { name: name, status: status };
            
            // 动画
            if (status === 'repair') {
                group.userData.animate = true;
            }
            
            return group;
        }
        
        function createGrid() {
            const gridHelper = new THREE.GridHelper(20, 20, 0x00d4ff, 0x003366);
            gridHelper.position.y = -2;
            scene.add(gridHelper);
        }
        
        function onMouseClick(event) {
            const rect = renderer.domElement.getBoundingClientRect();
            const mouse = new THREE.Vector2(
                ((event.clientX - rect.left) / rect.width) * 2 - 1,
                -((event.clientY - rect.top) / rect.height) * 2 + 1
            );
            
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(markers, true);
            
            if (intersects.length > 0) {
                let marker = intersects[0].object;
                while (marker.parent && !marker.userData.name) {
                    marker = marker.parent;
                }
                if (marker.userData.name) {
                    const part = aircraftData.parts.find(p => p.name === marker.userData.name);
                    if (part) {
                        showPartDetail(part);
                    }
                }
            }
        }
        
        function showPartDetail(part) {
            document.getElementById('popup-title').textContent = part.name;
            document.getElementById('popup-content').innerHTML = `
                <p style="margin-bottom: 10px;">
                    <span style="color: ${part.status === 'repair' ? '#ff6b6b' : '#6bff6b'};">
                        ${part.status === 'repair' ? '● 维修中' : '● 已完成'}
                    </span>
                </p>
                <p style="font-size: 13px; line-height: 1.6;">${part.detail}</p>
            `;
            document.getElementById('detail-popup').classList.add('show');
        }
        
        function closePopup() {
            document.getElementById('detail-popup').classList.remove('show');
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '待定';
            
            // 支持时间戳（数字或字符串）和日期字符串
            let date;
            if (/^\d+$/.test(dateStr)) {
                // 纯数字，当作时间戳处理
                date = new Date(parseInt(dateStr));
            } else {
                // 其他格式，直接解析
                date = new Date(dateStr);
            }
            
            // 检查日期是否有效
            if (isNaN(date.getTime())) {
                return '待定';
            }
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}年${month}月${day}日`;
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.05;
            
            // 标记点动画
            markers.forEach(marker => {
                if (marker.userData.animate) {
                    marker.scale.setScalar(1 + Math.sin(time * 3) * 0.2);
                }
            });
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        // 等待Three.js加载完成后初始化
        function waitForThreeJS() {
            if (typeof THREE !== 'undefined') {
                init();
            } else {
                // 如果Three.js还没加载完，等待100ms后重试
                setTimeout(waitForThreeJS, 100);
            }
        }
        
        // 启动
        waitForThreeJS();
        
        // 暴露给父页面的接口
        window.setAircraftData = function(data) {
            if (data.no) document.getElementById('aircraft-no').textContent = data.no;
            if (data.model) document.getElementById('aircraft-model').textContent = data.model;
            if (data.inDate) document.getElementById('in-date').textContent = formatDate(data.inDate);
        };
    </script>
</body>
</html>
